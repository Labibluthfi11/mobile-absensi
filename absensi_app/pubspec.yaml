name: absensi_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  camera: ^0.10.5+9
  path_provider: ^2.1.3
  path: ^1.9.0
  geolocator: ^11.0.0
  intl: ^0.19.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# The following section is specific to Flutter packages.
flutter: # <--- BLOK 'flutter' YANG BENAR
  uses-material-design: true

  assets: # <--- PASTIKAN 'assets:' DI SINI, INDENTASI BENAR (2 spasi dari 'flutter:')
    - assets/images/ # <--- DAN INI JUGA INDENTASI BENAR (4 spasi dari 'flutter:')

  # Bagian komentar 'To add assets to your application...' dan contohnya
  # tidak perlu dihapus, biarkan saja, yang penting baris di atas sudah benar.